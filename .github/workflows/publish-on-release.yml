name: Publish npm on GitHub Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm run check

      - name: Test
        run: pnpm test

      - name: Verify release tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"   # v1.0.3 -> 1.0.3
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "release tag=$TAG, package.json=$PKG_VERSION"
          [ "$TAG" = "$PKG_VERSION" ] || (echo "Tag 与 package.json 版本不一致" && exit 1)

      - name: Prevent duplicate publish
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER 已存在，停止发布"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
